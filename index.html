<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultra Light MindMap</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <button id="add-node" title="ノード追加 (Tab)">+</button>
      <button id="delete-node" title="ノード削除 (Delete)">-</button>
      <button id="undo" title="元に戻す (Ctrl+Z)">↶</button>
      <button id="redo" title="やり直し (Ctrl+Y)">↷</button>
      <button id="zoom-in" title="拡大">🔍+</button>
      <button id="zoom-out" title="縮小">🔍-</button>
      <button id="fit" title="全体表示">⊡</button>
      <button id="save" title="保存 (Ctrl+S)">💾</button>
      <button id="load" title="読み込み">📁</button>
      <input type="file" id="file-input" accept=".json" style="display: none;">
    </div>
    <canvas id="mindmap-canvas"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
